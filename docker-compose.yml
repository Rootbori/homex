services:
  postgres:
    image: postgres:15-alpine
    container_name: homex-postgres
    environment:
      POSTGRES_USER: homex
      POSTGRES_PASSWORD: homex
      POSTGRES_DB: homex
    ports:
      - "5433:5432"
    volumes:
      - homex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homex -d homex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  homex-postgres-data:
